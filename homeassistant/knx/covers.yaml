# KNX Blinds / Covers Configuration - OLW23
# Generated from ETS export
#
# KNX cover addresses:
#   move_long_address  = "bew" address (DPT 1.008 - up/down)
#   stop_address       = "ss" address  (DPT 1.007 - stop/step)
#
# In Home Assistant, "moving_up" sends 0 (up) and "moving_down" sends 1 (down)
# on the move_long_address.
#
# travelling_time_down / travelling_time_up (seconds) - set to actual motor time!
# Default here: 30 seconds - adjust to your actual blind motor travel time.

