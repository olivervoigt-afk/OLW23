# KNX Lighting Configuration - OLW23
# Generated from ETS export
#
# Structure per room:
#   address          = Gesamt e/a   (on/off command, DPT 1.001)
#   dimming_address  = Gesamt dim   (relative dimming, DPT 3.007)
#   brightness_address = Gesamt Wert (brightness 0-255, DPT 5.001)
#   state_address    = schalten RM  (state feedback, DPT 1.001)
#   brightness_state_address = wert RM (brightness feedback, DPT 5.001)
#
# Feedback addresses (state_address) use the first circuit's
# RM address as a representative indicator for the whole room.

