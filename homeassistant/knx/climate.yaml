# KNX Climate Configuration - OLW23
# Generated from ETS export
#
# Per room climate addresses (X/7/Y offsets):
#   +0  = Solltemperatur (target temperature set, DPT 9.001)
#   +1  = Isttemperatur  (current temperature read, DPT 9.001)
#   +6  = Betriebsmodus  (operating mode set, DPT 20.102)
#   +7  = Betriebsmodus RM (operating mode feedback, DPT 20.102)
#   +12 = Feuchtigkeit   (humidity read, DPT 9.007)
#
# min_temp / max_temp in °C - adjust to your preferences

